name: Update Blog Manifest

on:
  push:
    paths:
      - 'content/blog/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate articles.json
        run: |
          python3 << 'PY'
          import json
          import os
          import re

          blog_dir = "content/blog"
          slugs = []

          for name in sorted(os.listdir(blog_dir)):
              if not name.endswith(".md"):
                  continue
              path = os.path.join(blog_dir, name)
              try:
                  with open(path, encoding="utf-8") as f:
                      text = f.read()
              except OSError:
                  continue
              match = re.match(r"^---\r?\n([\s\S]*?)\r?\n---", text)
              if not match:
                  continue
              status = "draft"
              for line in match.group(1).splitlines():
                  if line.strip().startswith("status:"):
                      status = line.split(":", 1)[1].strip().strip('"')
              if status == "published":
                  slugs.append(name[:-3])

          out_path = os.path.join(blog_dir, "articles.json")
          with open(out_path, "w", encoding="utf-8") as out:
              json.dump(slugs, out, indent=2, ensure_ascii=False)
              out.write("\n")
          PY

      - name: Commit and push if changed
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add content/blog/articles.json
          git diff --cached --quiet || git commit -m "Update blog articles manifest [skip ci]"
          git push
