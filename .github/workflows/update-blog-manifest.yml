name: Update Blog Manifest

on:
  push:
    paths:
      - 'content/blog/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate articles.json
        run: |
          cd content/blog
          slugs=$(ls *.md 2>/dev/null | sed 's/\.md$//' | sort)
          echo "[" > articles.json
          first=true
          for slug in $slugs; do
            if [ "$first" = true ]; then
              echo "  \"$slug\"" >> articles.json
              first=false
            else
              echo "  ,$slug" >> articles.json
            fi
          done
          echo "]" >> articles.json

      - name: Commit and push if changed
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add content/blog/articles.json
          git diff --cached --quiet || git commit -m "Update blog articles manifest [skip ci]"
          git push
