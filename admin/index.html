<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Admin — Blog</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico" />
    <link href="/config.yaml" type="text/yaml" rel="cms-config-url" />
    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: #fff;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      }
      .sveltia-cms, #nc-root {
        height: 100%;
        width: 100%;
        border: none;
        display: block;
      }
      #nc-root-fallback {
        display: none;
        padding: 4rem 2rem;
        text-align: center;
      }
      #nc-root-fallback.show {
        display: block;
      }
      #nc-root-fallback h1 {
        margin-bottom: 1rem;
        color: #222;
      }
      #nc-root-fallback p {
        color: #555;
        max-width: 40ch;
        margin: 0 auto 1.5rem;
      }
      #nc-root-fallback code {
        background: #f4f4f4;
        padding: 2px 6px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="nc-root"></div>
    <script src="https://unpkg.com/@sveltia/cms@0.103.0/dist/sveltia-cms.js"></script>
    <script>
      // Configuração manual para autenticação com PAT (Personal Access Token)
      window.addEventListener('load', function () {
        // Sveltia CMS já carrega o config.yaml automaticamente via
        // <link rel="cms-config-url">, mas sem base_url ele vai oferecer
        // a opção "Sign in with token" para usar PAT direto.
      });

      // Fallback: se o CMS não carregar em 10 segundos, mostra mensagem
      window.setTimeout(function () {
        var el = document.getElementById('nc-root-fallback');
        var app = document.getElementById('nc-root') || document.querySelector('.sveltia-cms');
        if (el && !app) {
          el.classList.add('show');
        }
      }, 10000);
    </script>
    <div id="nc-root-fallback">
      <h1>Não foi possível carregar o editor</h1>
      <p>Verifique a conexão, o arquivo <code>config.yaml</code> e o Token de acesso. Você também pode publicar editando arquivos em <code>content/blog/</code> diretamente pelo GitHub.</p>
    </div>
  </body>
</html>
