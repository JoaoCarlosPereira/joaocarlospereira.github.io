<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Admin — Blog</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico" />
    <link href="/config.yaml" type="text/yaml" rel="cms-config-url" />
    <style>
      body {
        margin: 0;
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        background: #f4f6fb;
        color: #212529;
      }
      #nc-root-fallback {
        display: none;
        max-width: 32rem;
        margin: 4rem auto;
        padding: 2rem;
        background: #fff;
        border-radius: 0.75rem;
        box-shadow: 0 0.5rem 1.5rem rgba(0, 0, 0, 0.08);
        text-align: center;
      }
      #nc-root-fallback.show {
        display: block;
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/@sveltia/cms@0.103.0/dist/sveltia-cms.js"></script>
    <script>
      window.setTimeout(function () {
        var el = document.getElementById("nc-root-fallback");
        var app = document.getElementById("nc-root") || document.querySelector(".sveltia-cms");
        if (el && !app) {
          el.classList.add("show");
        }
      }, 10000);
    </script>
    <div id="nc-root-fallback">
      <h1>Não foi possível carregar o editor</h1>
      <p>Verifique a conexão, o Worker OAuth e o arquivo <code>config.yaml</code>. Você também pode publicar editando arquivos em <code>content/blog/</code> via Git.</p>
    </div>
  </body>
</html>
